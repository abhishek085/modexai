<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModexAI — Seller Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* subtle gradient background */
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
    .card { backdrop-filter: blur(8px); }
    /* spinner */
    .spinner { border: 3px solid rgba(255,255,255,.15); border-top-color: #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* toast */
    #toast { transition: opacity .3s; }
  </style>
</head>
<body class="text-slate-100 font-sans">

  <!-- ── Navbar ── -->
  <nav class="border-b border-slate-700 bg-slate-900/80 sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      <span class="text-xl font-bold tracking-tight">
        <span class="text-indigo-400">Modex</span><span class="text-white">AI</span>
        <span class="ml-2 text-sm font-normal text-slate-400">Seller Dashboard</span>
      </span>
      <div class="flex gap-4 text-sm">
        <a href="/docs" target="_blank"
           class="text-slate-400 hover:text-white transition">API Docs ↗</a>
        <a href="/" class="text-slate-400 hover:text-white transition">Marketplace ↗</a>
      </div>
    </div>
  </nav>

  <!-- ── Toast ── -->
  <div id="toast"
       class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-lg shadow-lg text-sm font-medium"></div>

  <main class="max-w-7xl mx-auto px-6 py-8 space-y-10">

    <!-- ── Earnings Summary ── -->
    <section>
      <h2 class="text-lg font-semibold text-slate-300 mb-4">Earnings Overview</h2>
      <div id="earnings-cards" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <!-- filled by JS -->
        <div class="col-span-3 flex justify-center py-8"><div class="spinner"></div></div>
      </div>
    </section>

    <!-- ── Your Listings ── -->
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-slate-300">Your Model Listings</h2>
        <button onclick="openUploadPanel()"
                class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition">
          + Upload New Model
        </button>
      </div>

      <div id="models-table-wrap" class="overflow-x-auto rounded-xl border border-slate-700 bg-slate-800/60 card">
        <div class="flex justify-center py-10"><div class="spinner"></div></div>
      </div>
    </section>

    <!-- ── Upload / Register New Model ── -->
    <section id="upload-panel" class="hidden">
      <div class="rounded-xl border border-slate-700 bg-slate-800/60 card p-6">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-lg font-semibold text-slate-200">Register a New Model</h2>
          <button onclick="closeUploadPanel()" class="text-slate-400 hover:text-white text-xl leading-none">&times;</button>
        </div>

        <form id="upload-form" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-5">

          <!-- Name -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Model Name *</label>
            <input name="name" required placeholder="e.g. Finance LoRA v2"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Niche -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Niche *</label>
            <input name="niche" required placeholder="e.g. finance, devops, medical"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Base Model -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Base Model *</label>
            <input name="base_model" required placeholder="e.g. phi-3-mini, llama-3-8b"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Ollama model tag -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Ollama Model Tag</label>
            <input name="ollama_model" placeholder="phi3:mini"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Price -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Price (USD) *</label>
            <input name="price_usd" type="number" min="0" step="0.01" required placeholder="4.99"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Version -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Version</label>
            <input name="version" placeholder="1.0.0"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Benchmark accuracy -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Benchmark Accuracy (0–1)</label>
            <input name="accuracy" type="number" min="0" max="1" step="0.01" placeholder="0.90"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Benchmark latency -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Benchmark Latency (ms)</label>
            <input name="latency_ms" type="number" min="0" placeholder="120"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- Tags -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Tags (comma-separated)</label>
            <input name="tags" placeholder="finance, lora, phi-3"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <!-- File upload -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">GGUF Model File (optional)</label>
            <input name="model_file" type="file" accept=".gguf,.bin,.safetensors"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-300 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:bg-indigo-600 file:text-white file:cursor-pointer" />
            <p class="mt-1 text-xs text-slate-500">Upload later if not ready. Agents can purchase now and download once the file is available.</p>
          </div>

          <!-- Description -->
          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-slate-400 mb-1">Description *</label>
            <textarea name="description" required rows="3"
                      placeholder="Describe what this model is fine-tuned for, dataset used, and intended use cases."
                      class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
          </div>

          <!-- Actions -->
          <div class="md:col-span-2 flex gap-3 justify-end pt-2">
            <button type="button" onclick="closeUploadPanel()"
                    class="px-5 py-2 border border-slate-600 text-slate-300 text-sm rounded-lg hover:bg-slate-700 transition">
              Cancel
            </button>
            <button type="submit" id="upload-btn"
                    class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition flex items-center gap-2">
              <span>List Model</span>
            </button>
          </div>
        </form>
      </div>
    </section>

  </main>

  <!-- ── Confirm Delete Modal ── -->
  <div id="delete-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-black/60">
    <div class="bg-slate-800 rounded-xl border border-slate-600 p-6 max-w-sm w-full mx-4 shadow-xl">
      <h3 class="text-base font-semibold text-white mb-2">Delete Model</h3>
      <p class="text-sm text-slate-400 mb-6">
        Are you sure you want to remove <span id="delete-model-name" class="text-white font-medium"></span>?
        This action cannot be undone.
      </p>
      <div class="flex gap-3 justify-end">
        <button onclick="closeDeleteModal()"
                class="px-4 py-2 border border-slate-600 text-slate-300 text-sm rounded-lg hover:bg-slate-700 transition">Cancel</button>
        <button id="confirm-delete-btn"
                class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-sm font-medium rounded-lg transition">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let pendingDeleteId = null;

    /* ── Utilities ─────────────────────────────────────────── */
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function toast(msg, ok = true) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `fixed top-6 right-6 z-50 px-5 py-3 rounded-lg shadow-lg text-sm font-medium
        ${ok ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3500);
    }

    function fmtUSD(n) {
      return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    /* ── Fetch earnings & render stat cards ────────────────── */
    async function loadEarnings() {
      try {
        const res = await fetch(`${API}/seller/earnings`);
        const data = await res.json();
        document.getElementById('earnings-cards').innerHTML = `
          ${statCard('Total Models', data.total_models, '🗂️')}
          ${statCard('Total Purchases', data.total_purchases, '🛒')}
          ${statCard('Total Revenue', fmtUSD(data.total_revenue_usd), '💰')}
        `;
      } catch (e) {
        document.getElementById('earnings-cards').innerHTML =
          `<p class="col-span-3 text-center text-red-400 py-4">Failed to load earnings: ${e.message}</p>`;
      }
    }

    function statCard(label, value, icon) {
      return `
        <div class="rounded-xl bg-slate-800/70 border border-slate-700 px-6 py-5 card flex items-center gap-4">
          <span class="text-3xl">${icon}</span>
          <div>
            <p class="text-2xl font-bold text-white">${value}</p>
            <p class="text-sm text-slate-400 mt-0.5">${label}</p>
          </div>
        </div>`;
    }

    /* ── Fetch models & render table ───────────────────────── */
    async function loadModels() {
      const wrap = document.getElementById('models-table-wrap');
      try {
        const res = await fetch(`${API}/seller/models`);
        const models = await res.json();
        if (!models.length) {
          wrap.innerHTML = `<p class="text-center text-slate-400 py-10">No models listed yet. Upload your first model above.</p>`;
          return;
        }
        wrap.innerHTML = `
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-700">
                <th class="px-4 py-3">Model</th>
                <th class="px-4 py-3">Niche</th>
                <th class="px-4 py-3">Base</th>
                <th class="px-4 py-3">Price</th>
                <th class="px-4 py-3">Accuracy</th>
                <th class="px-4 py-3">Downloads</th>
                <th class="px-4 py-3">Revenue</th>
                <th class="px-4 py-3">File Size</th>
                <th class="px-4 py-3">Actions</th>
              </tr>
            </thead>
            <tbody>
              ${models.map(modelRow).join('')}
            </tbody>
          </table>`;
      } catch (e) {
        wrap.innerHTML = `<p class="text-center text-red-400 py-10">Failed to load models: ${e.message}</p>`;
      }
    }

    function modelRow(m) {
      const acc = m.benchmarks?.accuracy ?? '—';
      const tags = m.tags.slice(0, 3).map(t =>
        `<span class="inline-block px-2 py-0.5 rounded bg-slate-700 text-xs text-slate-300">${t}</span>`
      ).join(' ');
      return `
        <tr class="border-b border-slate-700/50 hover:bg-slate-700/30 transition">
          <td class="px-4 py-3">
            <p class="font-medium text-white">${m.name}</p>
            <p class="text-xs text-slate-500 mt-0.5">${m.id} · v${m.version}</p>
            <div class="flex flex-wrap gap-1 mt-1">${tags}</div>
          </td>
          <td class="px-4 py-3">
            <span class="px-2 py-1 rounded-full bg-indigo-900/60 text-indigo-300 text-xs font-medium">${m.niche}</span>
          </td>
          <td class="px-4 py-3 text-slate-300">${m.base_model}</td>
          <td class="px-4 py-3 text-emerald-400 font-semibold">${fmtUSD(m.price_usd)}</td>
          <td class="px-4 py-3 text-slate-300">${typeof acc === 'number' ? (acc * 100).toFixed(1) + '%' : acc}</td>
          <td class="px-4 py-3 text-slate-200 font-medium">${m.purchase_count}</td>
          <td class="px-4 py-3 text-emerald-300 font-medium">${fmtUSD(m.revenue_usd)}</td>
          <td class="px-4 py-3 text-slate-400">${m.size_mb > 0 ? m.size_mb + ' MB' : '—'}</td>
          <td class="px-4 py-3">
            <button class="delete-btn px-3 py-1 text-xs rounded border border-red-700 text-red-400 hover:bg-red-900/40 transition"
                    data-id="${m.id}" data-name="${escapeHtml(m.name)}">
              Delete
            </button>
          </td>
        </tr>`;
    }

    /* ── Upload form ───────────────────────────────────────── */
    function openUploadPanel() {
      document.getElementById('upload-panel').classList.remove('hidden');
      document.getElementById('upload-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function closeUploadPanel() {
      document.getElementById('upload-panel').classList.add('hidden');
      document.getElementById('upload-form').reset();
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span><span>Uploading…</span>';

      const formData = new FormData(e.target);

      // Remove empty file input so server treats it as null
      const fileInput = e.target.querySelector('input[type="file"]');
      if (fileInput && !fileInput.files.length) {
        formData.delete('model_file');
      }

      try {
        const res = await fetch(`${API}/seller/models`, { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || res.statusText);
        }
        toast('Model listed successfully! 🎉');
        closeUploadPanel();
        await Promise.all([loadModels(), loadEarnings()]);
      } catch (err) {
        toast(`Upload failed: ${err.message}`, false);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>List Model</span>';
      }
    });

    /* ── Delete modal ──────────────────────────────────────── */
    function openDeleteModal(id, name) {
      pendingDeleteId = id;
      document.getElementById('delete-model-name').textContent = name;
      document.getElementById('delete-modal').classList.remove('hidden');
    }

    function closeDeleteModal() {
      pendingDeleteId = null;
      document.getElementById('delete-modal').classList.add('hidden');
    }

    document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
      if (!pendingDeleteId) return;
      try {
        const res = await fetch(`${API}/seller/models/${pendingDeleteId}`, { method: 'DELETE' });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || res.statusText);
        }
        toast('Model deleted.');
        closeDeleteModal();
        await Promise.all([loadModels(), loadEarnings()]);
      } catch (err) {
        toast(`Delete failed: ${err.message}`, false);
        closeDeleteModal();
      }
    });

    /* ── Init ──────────────────────────────────────────────── */
    // Event delegation for dynamically-rendered delete buttons
    document.getElementById('models-table-wrap').addEventListener('click', (e) => {
      const btn = e.target.closest('.delete-btn');
      if (btn) {
        openDeleteModal(btn.dataset.id, btn.dataset.name);
      }
    });

    Promise.all([loadEarnings(), loadModels()]);
  </script>
</body>
</html>
